<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dad — a little film</title>
<meta name="description" content="A cinematic Father's Day keepsake.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Caveat:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="locked">
  <!-- overlays -->
  <canvas id="particles" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="progress-thread" aria-hidden="true"><span id="progressFill"></span></div>

  <!-- sound (shown only if CONFIG.musicSrc is set) -->
  <button class="sound-toggle" id="soundToggle" aria-label="Toggle music">♪</button>

  <!-- title card -->
  <div class="title-card" id="titleCard">
    <div class="tc-frame">
      <p class="tc-kicker">a short film</p>
      <h1 class="tc-title">For Dad</h1>
    </div>
    <button class="tc-begin" id="beginBtn">press to begin</button>
    <p class="tc-sub">turn your sound on ♪</p>
  </div>

  <!-- film scenes render here -->
  <main class="film" id="film"></main>

  <!-- lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lb-close" aria-label="Close">×</button>
    <button class="lb-nav lb-prev" aria-label="Previous">‹</button>
    <figure class="lb-figure">
      <img id="lbImage" src="" alt="">
      <figcaption id="lbCaption"></figcaption>
    </figure>
    <button class="lb-nav lb-next" aria-label="Next">›</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
